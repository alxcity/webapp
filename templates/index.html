<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single File Website</title>
    <style>
        /* CSS stays inside the HTML file here */
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #222;
        }

        header {
            background-color: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #f8f9fa;
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }

        main {
            flex: 1;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .cta-button {
            display: inline-block;
            background-color: #28a745;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 20px;
        }

        footer {
            background-color: #343a40;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>My All-in-One Site</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Features</a>
        <a href="#">Contact</a>
    </nav>

    <main>
        <h2>Everything in one file</h2>
        <p>
            This website uses internal CSS. You do not need a separate .css file 
            to make this look good. All the layout and design instructions are 
            stored right in the head of this document.
        </p>
        <a href="#" class="cta-button">Click for Magic</a>
    </main>

    <footer>
        <p>&copy; 2026 Created with Pure HTML/CSS</p>
    </footer>

</body>
</html>
